<svg width="680" height="790" viewBox="0 0 680 790" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'PingFang SC','Hiragino Sans GB','Helvetica Neue',sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto">
      <path d="M1.5,1.5 L6.5,4.5 L1.5,7.5" fill="none" stroke="#8A8880" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="790" fill="#FFFFFF"/>

  <text x="340" y="34" text-anchor="middle" font-size="17" font-weight="600" fill="#1F1E1D">Dossier：一个带同步的记忆文件夹 + 出门才启动的关卡</text>

  <!-- T1 外界 -->
  <rect x="40" y="64" width="600" height="104" rx="10" fill="#F1EFE8" stroke="#D3D1C7"/>
  <text x="56" y="87" font-size="14" font-weight="600" fill="#444441">外界 · 纯自然语言（对方不需要装任何东西）</text>
  <rect x="56" y="100" width="260" height="52" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="186" y="121" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">其他用户的 agent</text>
  <text x="186" y="138" text-anchor="middle" font-size="12" fill="#6B6A66">Kordi 里的协作方</text>
  <rect x="364" y="100" width="260" height="52" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="494" y="121" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">第三方服务 / 平台</text>
  <text x="494" y="138" text-anchor="middle" font-size="12" fill="#6B6A66">data portability 伙伴</text>

  <line x1="240" y1="168" x2="240" y2="220" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="250" y="199" font-size="12" fill="#6B6A66">自然语言随便问</text>
  <line x1="440" y1="220" x2="440" y2="168" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="450" y="199" font-size="12" fill="#6B6A66">只回「可说的话」</text>

  <!-- T2 我的 agent -->
  <rect x="170" y="220" width="340" height="56" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="340" y="242" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">我的 agent（对话前台）</text>
  <text x="340" y="260" text-anchor="middle" font-size="12" fill="#6B6A66">对外时手里只有名片级信息——说不出没有的东西</text>

  <line x1="240" y1="276" x2="240" y2="328" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="250" y="307" font-size="12" fill="#6B6A66">问：能说什么？</text>
  <line x1="440" y1="328" x2="440" y2="276" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="450" y="307" font-size="12" fill="#6B6A66">答：可说的话 / 别说 / 问主人</text>

  <!-- T3 dossier 小程序 -->
  <rect x="40" y="328" width="600" height="100" rx="10" fill="#E6F1FB" stroke="#B5D4F4"/>
  <text x="56" y="351" font-size="14" font-weight="600" fill="#0C447C">dossier 小程序 · 确定性关卡与管家（不是 LLM）</text>
  <rect x="56" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="121" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">answer</text>
  <text x="121" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">出门关卡 · 记账</text>
  <rect x="202" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="267" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">check</text>
  <text x="267" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">写入即检 · 退回重试</text>
  <rect x="348" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="413" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">sync</text>
  <text x="413" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">多设备合并</text>
  <rect x="494" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="559" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">tidy</text>
  <text x="559" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">脏度阈值触发</text>

  <line x1="240" y1="428" x2="240" y2="480" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="250" y="459" font-size="12" fill="#6B6A66">过检才入库 · 坏的当场退回</text>
  <line x1="440" y1="480" x2="440" y2="428" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="450" y="459" font-size="12" fill="#6B6A66">读回来的永远是干净数据</text>

  <!-- T4 一个文件夹，多处副本 -->
  <rect x="40" y="480" width="600" height="150" rx="10" fill="#E1F5EE" stroke="#9FE1CB"/>
  <text x="56" y="503" font-size="14" font-weight="600" fill="#085041">一个文件夹，多处副本（local-first · git 同步）</text>
  <rect x="56" y="518" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#BCE4D4"/>
  <text x="136" y="539" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">电脑</text>
  <text x="136" y="556" text-anchor="middle" font-size="12" fill="#6B6A66">agent 读写本地文件</text>
  <line x1="216" y1="544" x2="260" y2="544" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="238" y="537" text-anchor="middle" font-size="12" fill="#6B6A66">sync</text>
  <rect x="260" y="518" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#BCE4D4"/>
  <text x="340" y="539" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">手机</text>
  <text x="340" y="556" text-anchor="middle" font-size="12" fill="#6B6A66">瘦客户端 → 云副本</text>
  <line x1="420" y1="544" x2="464" y2="544" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="442" y="537" text-anchor="middle" font-size="12" fill="#6B6A66">sync</text>
  <rect x="464" y="518" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#BCE4D4"/>
  <text x="544" y="539" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">云 · 自托管</text>
  <text x="544" y="556" text-anchor="middle" font-size="12" fill="#6B6A66">24/7 答已放行的问题</text>
  <text x="340" y="600" text-anchor="middle" font-size="12" fill="#3E6E5C">self/ · peers/ · notes/（草稿不外传） · policy.yaml · ledger.log</text>

  <line x1="240" y1="630" x2="240" y2="670" stroke="#8A8880" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <text x="250" y="653" font-size="12" fill="#6B6A66">库里没有 / 要拍板 → 问主人</text>
  <line x1="440" y1="670" x2="440" y2="630" stroke="#8A8880" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <text x="450" y="653" font-size="12" fill="#6B6A66">答案可存库 · 库生长</text>

  <!-- T5 Owner -->
  <rect x="250" y="670" width="180" height="50" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="340" y="691" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">Owner（真人）</text>
  <text x="340" y="708" text-anchor="middle" font-size="12" fill="#6B6A66">拍板灰区 · 回答库里没有的</text>

  <text x="340" y="750" text-anchor="middle" font-size="12" fill="#6B6A66">青 = 你控制　蓝 = 关卡　灰 = 外界　虚线 = 问主人回路</text>
  <text x="340" y="772" text-anchor="middle" font-size="12" fill="#444441">热路径极简、冷路径不手软 —— 能力可能漂移，安全不会漂移</text>
</svg>
