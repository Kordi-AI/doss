<svg width="680" height="790" viewBox="0 0 680 790" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto">
      <path d="M1.5,1.5 L6.5,4.5 L1.5,7.5" fill="none" stroke="#8A8880" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="790" fill="#FFFFFF"/>

  <text x="340" y="34" text-anchor="middle" font-size="16" font-weight="600" fill="#1F1E1D">Dossier: a synced memory folder + a gate that wakes only for outbound info</text>

  <!-- T1 outside world -->
  <rect x="40" y="64" width="600" height="104" rx="10" fill="#F1EFE8" stroke="#D3D1C7"/>
  <text x="56" y="87" font-size="14" font-weight="600" fill="#444441">Outside world · plain natural language (nothing for them to install)</text>
  <rect x="56" y="100" width="260" height="52" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="186" y="121" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">Other users' agents</text>
  <text x="186" y="138" text-anchor="middle" font-size="12" fill="#6B6A66">collaborators on Kordi</text>
  <rect x="364" y="100" width="260" height="52" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="494" y="121" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">Third-party services</text>
  <text x="494" y="138" text-anchor="middle" font-size="12" fill="#6B6A66">data-portability partners</text>

  <line x1="240" y1="168" x2="240" y2="220" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="250" y="199" font-size="12" fill="#6B6A66">ask anything, plain language</text>
  <line x1="440" y1="220" x2="440" y2="168" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="450" y="199" font-size="12" fill="#6B6A66">gets only what's cleared</text>

  <!-- T2 my agent -->
  <rect x="170" y="220" width="340" height="56" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="340" y="242" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">My agent (front desk)</text>
  <text x="340" y="260" text-anchor="middle" font-size="12" fill="#6B6A66">card-level context only — can't leak what it lacks</text>

  <line x1="240" y1="276" x2="240" y2="328" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="250" y="307" font-size="12" fill="#6B6A66">what can I say?</text>
  <line x1="440" y1="328" x2="440" y2="276" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="450" y="307" font-size="12" fill="#6B6A66">cleared / denied / ask-owner</text>

  <!-- T3 dossier CLI -->
  <rect x="40" y="328" width="600" height="100" rx="10" fill="#E6F1FB" stroke="#B5D4F4"/>
  <text x="56" y="351" font-size="14" font-weight="600" fill="#0C447C">dossier CLI · deterministic gate &amp; housekeeping (not an LLM)</text>
  <rect x="56" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="121" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">answer</text>
  <text x="121" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">gate + ledger</text>
  <rect x="202" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="267" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">check</text>
  <text x="267" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">bounce &amp; retry</text>
  <rect x="348" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="413" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">sync</text>
  <text x="413" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">merge replicas</text>
  <rect x="494" y="364" width="130" height="48" rx="8" fill="#FFFFFF" stroke="#C7D9EC"/>
  <text x="559" y="383" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">tidy</text>
  <text x="559" y="400" text-anchor="middle" font-size="12" fill="#6B6A66">dirt-triggered</text>

  <line x1="240" y1="428" x2="240" y2="480" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="250" y="459" font-size="12" fill="#6B6A66">only validated writes land</text>
  <line x1="440" y1="480" x2="440" y2="428" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="450" y="459" font-size="12" fill="#6B6A66">reads always see clean data</text>

  <!-- T4 one folder, many replicas -->
  <rect x="40" y="480" width="600" height="150" rx="10" fill="#E1F5EE" stroke="#9FE1CB"/>
  <text x="56" y="503" font-size="14" font-weight="600" fill="#085041">One folder, many replicas (local-first · git sync)</text>
  <rect x="56" y="518" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#BCE4D4"/>
  <text x="136" y="539" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">Laptop</text>
  <text x="136" y="556" text-anchor="middle" font-size="12" fill="#6B6A66">local files, full copy</text>
  <line x1="216" y1="544" x2="260" y2="544" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="238" y="537" text-anchor="middle" font-size="12" fill="#6B6A66">sync</text>
  <rect x="260" y="518" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#BCE4D4"/>
  <text x="340" y="539" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">Phone</text>
  <text x="340" y="556" text-anchor="middle" font-size="12" fill="#6B6A66">thin client → cloud</text>
  <line x1="420" y1="544" x2="464" y2="544" stroke="#8A8880" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="442" y="537" text-anchor="middle" font-size="12" fill="#6B6A66">sync</text>
  <rect x="464" y="518" width="160" height="52" rx="8" fill="#FFFFFF" stroke="#BCE4D4"/>
  <text x="544" y="539" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">Cloud · GitHub repo</text>
  <text x="544" y="556" text-anchor="middle" font-size="12" fill="#6B6A66">private always-on copy</text>
  <text x="340" y="600" text-anchor="middle" font-size="12" fill="#3E6E5C">self/ · peers/ · notes/ (scratch — never shared) · policy.yaml · ledger.log</text>

  <line x1="240" y1="630" x2="240" y2="670" stroke="#8A8880" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <text x="250" y="653" font-size="12" fill="#6B6A66">miss / gray → ask the owner</text>
  <line x1="440" y1="670" x2="440" y2="630" stroke="#8A8880" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <text x="450" y="653" font-size="12" fill="#6B6A66">answers land · vault grows</text>

  <!-- T5 owner -->
  <rect x="220" y="670" width="240" height="50" rx="8" fill="#FFFFFF" stroke="#D0CFC8"/>
  <text x="340" y="691" text-anchor="middle" font-size="14" font-weight="500" fill="#1F1E1D">Owner (human)</text>
  <text x="340" y="708" text-anchor="middle" font-size="12" fill="#6B6A66">approves gray zones · answers misses</text>

  <text x="340" y="750" text-anchor="middle" font-size="12" fill="#6B6A66">teal = yours · blue = the gate · gray = outside · dashed = ask-the-owner loop</text>
  <text x="340" y="772" text-anchor="middle" font-size="12" fill="#444441">Ruthless on the hot path, capable on the cold path — competence may drift, safety cannot.</text>
</svg>
