# Who can see which categories of my info. Default: nothing (private).
#
# A category is a folder under self/ (e.g. profile, work). Rules are by folder,
# not by individual fact — so adding a new fact NEVER means editing this file,
# and adding a new group is just one block here. Nothing listed = nothing leaves.

groups:
  # friends:  [kordi:pedro, kordi:qiancx]
  # contacts: [kordi:jiaxin]

can-see:
  # friends:  [profile, work]   # friends see everything under self/profile/ and self/work/
  # contacts: [profile]         # contacts see only self/profile/
  # any group or folder not listed here: nothing

# Rough values (e.g. show a city, not a street) aren't set here — put a
# `rough:` field on the fact itself, and share that instead of the raw content.
# Generalization is data you author, not something decided on the fly.
