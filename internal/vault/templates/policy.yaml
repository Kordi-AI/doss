# Who can receive which version of my info. Default: nothing (private).
#
# Topics are paths under self/ without the self/ prefix, e.g. profile/address
# or work. Folder rules inherit to facts below them; a more specific topic wins.
# Nothing listed = no disclosure.

groups:
  # friends:  [kordi:pedro, kordi:qiancx]
  # contacts: [kordi:jiaxin]

can-see:
  # friends:
  #   profile/address: rough   # share only the fact's owner-written rough value
  #   profile/dietary: full    # share the full fact body
  #   work: rough              # applies to everything under self/work/
  # contacts:
  #   profile/address: rough
  # any group or topic not listed here: no disclosure

# Levels:
#   no    = say nothing (also the default)
#   rough = share only the fact's rough: value
#   full  = share the full fact body
# If someone belongs to several groups, use the highest level: no < rough < full.
