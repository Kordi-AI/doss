# Which folders on THIS device may be shared with others.
# Device-only: lives in local/, is gitignored, and never syncs to the cloud
# (paths are machine-specific, so cross-device it would be meaningless).
#
# Default is deny: a file may leave only if it's under an `allow` folder and
# not under any `deny` folder. Edit this like any other file.

allow: []
  # - ~/Projects/opensource
  # - ~/Documents/public

deny: []
  # - ~/Documents/public/drafts
