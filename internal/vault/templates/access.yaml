# What your agent may DO with THIS device's folders when acting for OTHER people.
#
# Device-local: never syncs. This is about this computer's files (which folders
# exist differs per machine), NOT owner-memory disclosure — that's policy.yaml.
#
# Difference:
#   policy.yaml       = what owner memory may leave self/ (no/rough/full), syncs
#   local/access.yaml = what local folders may be read/edited/run here, no sync
#
# local/access.yaml never grants permission to disclose owner facts from self/.
# Groups and verified requester ids are defined in policy.yaml.
#
# Levels:  no  = don't touch it for them
#          read = may read / share files in that folder
#          full = may read, edit, and run there (e.g. fix a bug they delegate)
# Default: no — a group or folder not listed gets nothing.

grants:
  # friends:
  #   ~/Projects/opensource: full    # read, edit, run
  #   ~/Documents/public: read       # may read/share, not modify
  # contacts:
  #   ~/Projects/opensource: read
